name: API CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/api-ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/api-ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fonthabesha
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fonthabesha"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meilisearch:
        image: getmeili/meilisearch:v1.16
        env:
          MEILI_MASTER_KEY: masterKey
        ports:
          - 7700:7700
        options: >-
          --health-cmd "curl -fsS http://localhost:7700/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: minio/minio:RELEASE.2025-02-28T09-55-16Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        command: server /data
    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fonthabesha
      REDIS_URL: redis://localhost:6379
      MEILISEARCH_URL: http://localhost:7700
      MEILISEARCH_API_KEY: masterKey
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_RAW: fonthabesha-raw
      S3_BUCKET_PUBLIC: fonthabesha-public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      APP_BASE_URL: http://localhost:3000
      CDN_BASE_URL: http://localhost:9000
      FRONTEND_URL: http://localhost:5173
      MAIL_QUEUE_ENABLED: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run prisma:generate:backend
      - run: npm run prisma:validate:backend
      - run: npx prisma migrate deploy --schema backend/prisma/schema.prisma
      - run: npm run seed:backend
      - run: npm run build:backend
      - run: npm test --workspace @fonthabesha/backend
