name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run prisma:generate:api
      - run: npm run prisma:validate:api
      - run: npm run build:api
