<!doctype html>
<html lang="am">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base SEO -->
    <meta name="description" content="Fonthabesha — የኢትዮጵያ ፊደሎች ቤት። Discover, preview, and download free Ethiopic and Amharic fonts." />
    <meta name="keywords" content="Ethiopic fonts, Amharic fonts, Ge'ez, free fonts, open source, typography" />
    <title>Fonthabesha</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://fonthabesha.com/" />
    <meta property="og:title"       content="Fonthabesha — የኢትዮጵያ ፊደሎች ቤት" />
    <meta property="og:description" content="Discover, preview, and download free Ethiopic and Amharic fonts. Open platform for Ethiopic typography." />
    <meta property="og:image"       content="https://fonthabesha.com/og-cover.png" />
    <meta property="og:locale"      content="am_ET" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Fonthabesha — የኢትዮጵያ ፊደሎች ቤት" />
    <meta name="twitter:description" content="Discover, preview, and download free Ethiopic and Amharic fonts." />
    <meta name="twitter:image"       content="https://fonthabesha.com/og-cover.png" />

    <!-- Theme color (matches --color-nav-bg) -->
    <meta name="theme-color" content="#1a1410" />

    <!-- Noto Sans Ethiopic: primary UI + specimen fallback font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wdth,wght@75..125,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon: Ethiopic letter ፍ as SVG data URI -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ፍ</text></svg>"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
